---
on:
  workflow_dispatch:
    inputs:
      name:
        description: "Image Name"
        required: true
        type: choice
        options:
          - koboldcpp
          - comfyui

name: Build Container

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build ${{ github.event.inputs.name }}:${{ github.event.inputs.variant }}
    permissions:
      contents: write
      packages: write

    steps:
      - name: Stop Docker Service
        run: |
          sudo systemctl stop docker.service
          sudo systemctl stop docker.socket

      - name: Remove Docker Data
        run: |
          sudo rm -rf /var/lib/docker
          sudo mkdir -p /var/lib/docker

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 1024
          swap-size-mb: 1024
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          build-mount-path: /var/lib/docker

      - name: Show Disk Space
        run: df -h

      - name: Start Docker Service
        run: |
          sudo systemctl start docker.service
          sudo systemctl start docker.socket

      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define Image Suffixs (Release)
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          _DATE_VER=$(date +'%Y%m%d')
          IMAGE_VERSION_SUFFIX=-${_DATE_VER}
          IMAGE_VARIANT_SUFFIX=""

          echo "PAI_BUILD_VERSION_SUFFIX=${IMAGE_VERSION_SUFFIX}" >> $GITHUB_ENV
          echo "PAI_BUILD_VARIANT_SUFFIX=${IMAGE_VARIANT_SUFFIX}" >> $GITHUB_ENV

      - name: Define Image Suffixs (Release)
        if: ${{ github.ref != 'refs/heads/main' }}
        run: |
          IMAGE_VERSION_SUFFIX=-preview
          IMAGE_VARIANT_SUFFIX=-preview

          echo "PAI_BUILD_VERSION_SUFFIX=${IMAGE_VERSION_SUFFIX}" >> $GITHUB_ENV
          echo "PAI_BUILD_VARIANT_SUFFIX=${IMAGE_VARIANT_SUFFIX}" >> $GITHUB_ENV

      - name: Define Release Tag
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          _DATE_VER=$(date +'%Y%m%d')
          RELEASE_TAG=${{ github.event.inputs.name }}-${_DATE_VER}

      - name: Build and Push Base Images
        run: |
          docker compose -f docker-compose.build.yml build
          docker compose -f docker-compose.build.yml push
        working-directory: apps/${{ github.event.inputs.name }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          body: |
            Image: `${{ github.event.inputs.name }}`
