---
on:
  workflow_dispatch:
    inputs:
      name:
        description: "Image Name"
        required: true
        type: choice
        options:
          - koboldcpp
          - comfyui

name: Build Container

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      builds: ${{ steps.prepare-builds.outputs.builds }}
    steps:
      - name: Checkout Project
        uses: actions/checkout@v7

      - name: Setup Uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          working-directory: helpers
          enable-cache: true

      - name: Install Dependencies
        run: uv sync
        working-directory: helpers

      - name: Prepare Build Info
        id: prepare-builds
        run: |
          _PREPARED_BUILDS=$(
            uv run paictl \
              prepare-builds \
                --src=../apps/${{ github.event.inputs.name }}/docker-compose.build.yml
          )

          echo "builds=$_PREPARED_BUILDS" >> "$GITHUB_OUTPUT"
        working-directory: helpers

  build:
    runs-on: ubuntu-latest
    name: Build ${{ github.event.inputs.name }}:${{ matrix.build.variant }}
    needs: prepare
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        build: ${{ fromJSON(needs.prepare.outputs.builds) }}

    steps:
      - name: Stop Docker Service
        run: |
          sudo systemctl stop docker.service
          sudo systemctl stop docker.socket

      - name: Remove Docker Data
        run: |
          sudo rm -rf /var/lib/docker
          sudo mkdir -p /var/lib/docker

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 1024
          swap-size-mb: 1024
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          build-mount-path: /var/lib/docker

      - name: Show Disk Space
        run: df -h

      - name: Start Docker Service
        run: |
          sudo systemctl start docker.service
          sudo systemctl start docker.socket

      - name: Checkout Project
        uses: actions/checkout@v7

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define Image Suffixs (Release)
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          _DATE_VER=$(date +'%Y%m%d')
          IMAGE_VERSION_SUFFIX=-${_DATE_VER}
          IMAGE_VARIANT_SUFFIX=""

          echo "PAI_BUILD_VERSION_SUFFIX=${IMAGE_VERSION_SUFFIX}" >> $GITHUB_ENV
          echo "PAI_BUILD_VARIANT_SUFFIX=${IMAGE_VARIANT_SUFFIX}" >> $GITHUB_ENV

      - name: Define Image Suffixs (Release)
        if: ${{ github.ref != 'refs/heads/main' }}
        run: |
          IMAGE_VERSION_SUFFIX=-preview
          IMAGE_VARIANT_SUFFIX=-preview

          echo "PAI_BUILD_VERSION_SUFFIX=${IMAGE_VERSION_SUFFIX}" >> $GITHUB_ENV
          echo "PAI_BUILD_VARIANT_SUFFIX=${IMAGE_VARIANT_SUFFIX}" >> $GITHUB_ENV

      - name: Define Release Tag
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          _DATE_VER=$(date +'%Y%m%d')
          RELEASE_TAG=${{ github.event.inputs.name }}-${{ matrix.build.version }}${PAI_BUILD_VERSION_SUFFIX}

          echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV

      - name: Build and Push Base Images
        run: |
          docker compose -f docker-compose.build.yml build ${{ matrix.build.variant }}
          docker compose -f docker-compose.build.yml push ${{ matrix.build.variant }}
          docker compose -f docker-compose.build.yml build ${{ matrix.build.variant }}-variant
          docker compose -f docker-compose.build.yml push ${{ matrix.build.variant }}-variant
        working-directory: apps/${{ github.event.inputs.name }}

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          body: |
            Image: `${{ github.event.inputs.name }}`
            Variant: `${{ matrix.build.variant }}${{ env.IMAGE_VARIANT_SUFFIX }}`
            Version: `${{ env.IMAGE_VERSION }}`
            URI: `ghcr.io/futursolo/pai-apps/${{ github.event.inputs.name }}:${{ matrix.build.variant }}`
            URI: `ghcr.io/futursolo/pai-apps/${{ github.event.inputs.name }}:${{ matrix.build.version }}${{ env.PAI_BUILD_VERSION_SUFFIX }}`
